<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise Timer</title>
    <style>
        :root {
            --bg: #dfe8f3;
            --card: #fdfefe;
            --text: #223042;
            --muted: #6f7f90;
            --accent: #4a7cf3;
            --accent-dark: #3567dc;
            --border: #c9d7e6;
            --warning: #d96b6b;
            --warning-dark: #bf5656;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(180deg, #eaf1f8 0%, #dfe8f3 100%);
            color: var(--text);
            line-height: 1.4;
        }

        .wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px;
        }

        .card {
            background: linear-gradient(180deg, #ffffff 0%, #f9fbfe 100%);
            border: 1px solid rgba(201, 215, 230, 0.95);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(34, 48, 66, 0.10), 0 2px 8px rgba(34, 48, 66, 0.04);
            margin-bottom: 16px;
        }

        .big-timer {
            font-size: clamp(56px, 12vw, 96px);
            font-weight: 700;
            letter-spacing: 1px;
            text-align: center;
            margin: 12px 0;
        }

        .phase {
            text-align: center;
            font-size: 18px;
            color: var(--accent);
            font-weight: 700;
            margin-bottom: 8px;
            min-height: 28px;
        }

        .exercise-name {
            text-align: center;
            font-size: clamp(24px, 4vw, 36px);
            font-weight: 700;
            min-height: 44px;
            margin-bottom: 6px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 18px;
        }

        button {
            border: 0;
            border-radius: 14px;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            min-width: 120px;
            transition: background 0.2s ease, transform 0.1s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 12px rgba(53, 103, 220, 0.18);
        }

            button:hover {
                transform: translateY(-1px);
            }

            button:active {
                transform: translateY(1px);
            }

        #actionBtn {
            background: var(--accent);
            color: white;
        }

            #actionBtn:hover {
                background: var(--accent-dark);
            }

        #resetBtn {
            background: var(--warning);
            color: white;
            box-shadow: 0 4px 12px rgba(217, 107, 107, 0.22);
        }

            #resetBtn:hover {
                background: var(--warning-dark);
            }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 14px;
        }

        .stat {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            background: #fafcff;
        }

        .stat-label {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
        }

        .hint {
            color: var(--muted);
            font-size: 14px;
            display: inline;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            border-bottom: 1px solid var(--border);
            padding: 10px 8px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f7faff;
        }

        @media (max-width: 720px) {
            th, td {
                font-size: 13px;
                padding: 8px 6px;
            }

            button {
                flex: 1 1 40%;
            }

            .status-grid {
                grid-template-columns: 1fr;
            }

            .hint {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="card">
            <div class="phase" id="phase">Ready</div>
            <div class="exercise-name" id="exerciseName">Press Start</div>
            <div class="big-timer" id="timer">00:15</div>

            <div class="controls">
                <button id="actionBtn">Start</button>
                <button id="resetBtn">Reset</button>
            </div>

            <div class="status-grid">
                <div class="stat">
                    <div class="stat-label">Current step</div>
                    <div class="stat-value" id="stepInfo">Not started</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Routine progress</div>
                    <div class="stat-value" id="progressInfo">0 / 7</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Exercise Plan</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Exercise</th>
                        <th>Hold</th>
                        <th>Repetitions</th>
                        <th>Sides</th>
                        <th>Break</th>
                    </tr>
                </thead>
                <tbody id="planBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const TOTAL_EXERCISES = 7;
        const START_COUNTDOWN = 15;
        const PREP_SECONDS = 15;

        const HIP_FLEXOR_WORK_SECONDS = 30;
        const HIP_FLEXOR_BREAK_SECONDS = 10;
        const HIP_FLEXOR_SWITCH_SECONDS = 10;

        const CAT_COW_REP_SECONDS = 10;

        const CHILDS_POSE_WORK_SECONDS = 60;
        const CHILDS_POSE_BREAK_SECONDS = 10;

        const GLUTE_BRIDGE_REP_SECONDS = 6;
        const GLUTE_BRIDGE_BREAK_SECONDS = 6;

        const DRAGON_WORK_SECONDS = 45;
        const DRAGON_BREAK_SECONDS = 10;
        const DRAGON_SWITCH_SECONDS = 10;

        const PIGEON_WORK_SECONDS = 45;
        const PIGEON_BREAK_SECONDS = 10;
        const PIGEON_SWITCH_SECONDS = 10;

        const CLAMSHELL_REP_SECONDS = 5;
        const CLAMSHELL_SWITCH_SECONDS = 10;

        const exercises = [
            {
                name: "Hip Flexor Stretch",
                hold: 30,
                repetitions: 2,
                sides: 2,
                breakSec: 10,
                details: "Lunge position, upright torso, stretch the front of the hip."
            },
            {
                name: "Cat-Cow",
                hold: 10,
                repetitions: 20,
                sides: 0,
                breakSec: 0,
                details: "Start with Cat, then alternate Cat and Cow."
            },
            {
                name: "Child's Pose",
                hold: 60,
                repetitions: 2,
                sides: 0,
                breakSec: 10,
                details: "Full relaxation, steady breathing."
            },
            {
                name: "Glute Bridge on Heels",
                hold: 6,
                repetitions: 10,
                sides: 0,
                breakSec: 6,
                details: "Press through heels and squeeze glutes at the top."
            },
            {
                name: "Dragon Stretch",
                hold: 45,
                repetitions: 2,
                sides: 2,
                breakSec: 10,
                details: "Slight side shift to target glute medius."
            },
            {
                name: "Pigeon Stretch",
                hold: 45,
                repetitions: 2,
                sides: 2,
                breakSec: 10,
                details: "Gentle hip opener, stay relaxed."
            },
            {
                name: "Clamshell",
                hold: 5,
                repetitions: 10,
                sides: 2,
                breakSec: 0,
                details: "Side-lying, feet together, open top knee without rolling pelvis."
            }
        ];

        const planBody = document.getElementById("planBody");
        const actionBtn = document.getElementById("actionBtn");
        const resetBtn = document.getElementById("resetBtn");

        const phaseEl = document.getElementById("phase");
        const exerciseNameEl = document.getElementById("exerciseName");
        const timerEl = document.getElementById("timer");
        const stepInfoEl = document.getElementById("stepInfo");
        const progressInfoEl = document.getElementById("progressInfo");

        let appState = "ready";
        let steps = [];
        let currentStepIndex = 0;
        let remaining = START_COUNTDOWN;
        let intervalId = null;

        function formatTime(totalSec) {
            const mins = Math.floor(totalSec / 60);
            const secs = totalSec % 60;
            return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
        }

        function speak(text) {
            if (!("speechSynthesis" in window) || !text) return;
            try {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.volume = 1.0;
                window.speechSynthesis.speak(utterance);
            } catch (error) {
                console.error("Speech error:", error);
            }
        }

        function warmupSpeech() {
            if ("speechSynthesis" in window) {
                const warmup = new SpeechSynthesisUtterance("");
                window.speechSynthesis.speak(warmup);
            }
        }

        function buildPlanTable() {
            planBody.innerHTML = "";

            exercises.forEach((ex, i) => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                  <td>${i + 1}</td>
                  <td>
                    <strong>${ex.name}</strong><br>
                    <span class="hint">${ex.details}</span>
                  </td>
                  <td>${ex.hold} sec</td>
                  <td>${ex.repetitions}</td>
                  <td>${ex.sides === 0 ? "–" : ex.sides}</td>
                  <td>${ex.breakSec} sec</td>
                `;
                planBody.appendChild(tr);
            });
        }

        function createStep(type, phase, exerciseName, stepInfo, progress, seconds, announce) {
            return {
                type,
                phase,
                exerciseName,
                stepInfo,
                progress,
                seconds,
                announce
            };
        }

        function addPrepStep(builtSteps, exerciseName, exerciseNumber, previousProgress) {
            builtSteps.push(
                createStep(
                    "intro",
                    "Get Ready",
                    exerciseName,
                    `${exerciseNumber}. ${exerciseName} - Prepare`,
                    previousProgress,
                    PREP_SECONDS,
                    `Get ready, your next exercise is ${exerciseName}.`
                )
            );
        }

        function addGroupedSideExercise(builtSteps, config) {
            const {
                number,
                name,
                workSeconds,
                repetitionsPerSide,
                breakSeconds,
                switchSeconds
            } = config;

            const progress = `${number} / ${TOTAL_EXERCISES}`;

            builtSteps.push(
                createStep(
                    "work",
                    "One Side",
                    name,
                    `${number}. ${name} - One side - Repetition 1 of ${repetitionsPerSide}`,
                    progress,
                    workSeconds,
                    "Begin"
                )
            );

            for (let rep = 2; rep <= repetitionsPerSide; rep++) {
                if (breakSeconds > 0) {
                    builtSteps.push(
                        createStep(
                            "break",
                            "Break",
                            name,
                            `${number}. ${name} - One side - Break`,
                            progress,
                            breakSeconds,
                            "Break"
                        )
                    );
                }

                builtSteps.push(
                    createStep(
                        "work",
                        "One Side",
                        name,
                        `${number}. ${name} - One side - Repetition ${rep} of ${repetitionsPerSide}`,
                        progress,
                        workSeconds,
                        "Repeat"
                    )
                );
            }

            builtSteps.push(
                createStep(
                    "switch",
                    "Switch Sides",
                    name,
                    `${number}. ${name} - Switch to another side`,
                    progress,
                    switchSeconds,
                    "Switch to another side"
                )
            );

            builtSteps.push(
                createStep(
                    "work",
                    "Another Side",
                    name,
                    `${number}. ${name} - Another side - Repetition 1 of ${repetitionsPerSide}`,
                    progress,
                    workSeconds,
                    "Repeat"
                )
            );

            for (let rep = 2; rep <= repetitionsPerSide; rep++) {
                if (breakSeconds > 0) {
                    builtSteps.push(
                        createStep(
                            "break",
                            "Break",
                            name,
                            `${number}. ${name} - Another side - Break`,
                            progress,
                            breakSeconds,
                            "Break"
                        )
                    );
                }

                builtSteps.push(
                    createStep(
                        "work",
                        "Another Side",
                        name,
                        `${number}. ${name} - Another side - Repetition ${rep} of ${repetitionsPerSide}`,
                        progress,
                        workSeconds,
                        "Repeat"
                    )
                );
            }
        }

        function addSingleTrackExercise(builtSteps, config) {
            const {
                number,
                name,
                repetitions,
                workSeconds,
                breakSeconds
            } = config;

            const progress = `${number} / ${TOTAL_EXERCISES}`;

            for (let rep = 1; rep <= repetitions; rep++) {
                builtSteps.push(
                    createStep(
                        "work",
                        name,
                        name,
                        `${number}. ${name} - Repetition ${rep} of ${repetitions}`,
                        progress,
                        workSeconds,
                        rep === 1 ? "Begin" : "Repeat"
                    )
                );

                if (breakSeconds > 0 && rep < repetitions) {
                    builtSteps.push(
                        createStep(
                            "break",
                            "Break",
                            name,
                            `${number}. ${name} - Break`,
                            progress,
                            breakSeconds,
                            "Break"
                        )
                    );
                }
            }
        }

        function buildSteps() {
            const builtSteps = [];

            builtSteps.push(
                createStep(
                    "intro",
                    "Get Ready",
                    "Hip Flexor Stretch",
                    "Starting soon",
                    "0 / 7",
                    START_COUNTDOWN,
                    "Your exercises will start in 15 seconds and your first exercise will be Hip Flexor Stretch."
                )
            );

            addGroupedSideExercise(builtSteps, {
                number: 1,
                name: "Hip Flexor Stretch",
                workSeconds: HIP_FLEXOR_WORK_SECONDS,
                repetitionsPerSide: 2,
                breakSeconds: HIP_FLEXOR_BREAK_SECONDS,
                switchSeconds: HIP_FLEXOR_SWITCH_SECONDS
            });

            addPrepStep(builtSteps, "Cat-Cow", 2, "1 / 7");

            for (let rep = 1; rep <= 20; rep++) {
                const cue = rep % 2 === 1 ? "Cat" : "Cow";
                builtSteps.push(
                    createStep(
                        "work",
                        "Cat-Cow",
                        "Cat-Cow",
                        `2. Cat-Cow - Repetition ${rep} of 20`,
                        "2 / 7",
                        CAT_COW_REP_SECONDS,
                        cue
                    )
                );
            }

            addPrepStep(builtSteps, "Child's Pose", 3, "2 / 7");

            addSingleTrackExercise(builtSteps, {
                number: 3,
                name: "Child's Pose",
                repetitions: 2,
                workSeconds: CHILDS_POSE_WORK_SECONDS,
                breakSeconds: CHILDS_POSE_BREAK_SECONDS
            });

            addPrepStep(builtSteps, "Glute Bridge on Heels", 4, "3 / 7");

            addSingleTrackExercise(builtSteps, {
                number: 4,
                name: "Glute Bridge on Heels",
                repetitions: 10,
                workSeconds: GLUTE_BRIDGE_REP_SECONDS,
                breakSeconds: GLUTE_BRIDGE_BREAK_SECONDS
            });

            addPrepStep(builtSteps, "Dragon Stretch", 5, "4 / 7");

            addGroupedSideExercise(builtSteps, {
                number: 5,
                name: "Dragon Stretch",
                workSeconds: DRAGON_WORK_SECONDS,
                repetitionsPerSide: 2,
                breakSeconds: DRAGON_BREAK_SECONDS,
                switchSeconds: DRAGON_SWITCH_SECONDS
            });

            addPrepStep(builtSteps, "Pigeon Stretch", 6, "5 / 7");

            addGroupedSideExercise(builtSteps, {
                number: 6,
                name: "Pigeon Stretch",
                workSeconds: PIGEON_WORK_SECONDS,
                repetitionsPerSide: 2,
                breakSeconds: PIGEON_BREAK_SECONDS,
                switchSeconds: PIGEON_SWITCH_SECONDS
            });

            addPrepStep(builtSteps, "Clamshell", 7, "6 / 7");

            addGroupedSideExercise(builtSteps, {
                number: 7,
                name: "Clamshell",
                workSeconds: CLAMSHELL_REP_SECONDS,
                repetitionsPerSide: 10,
                breakSeconds: 0,
                switchSeconds: CLAMSHELL_SWITCH_SECONDS
            });

            return builtSteps;
        }

        function updateActionButton() {
            if (appState === "ready" || appState === "finished") {
                actionBtn.textContent = "Start";
            } else if (appState === "running") {
                actionBtn.textContent = "Pause";
            } else if (appState === "paused") {
                actionBtn.textContent = "Resume";
            }
        }

        function setReadyState() {
            appState = "ready";
            clearInterval(intervalId);
            intervalId = null;

            if ("speechSynthesis" in window) {
                window.speechSynthesis.cancel();
            }

            phaseEl.textContent = "Ready";
            exerciseNameEl.textContent = "Press Start";
            timerEl.textContent = formatTime(START_COUNTDOWN);
            stepInfoEl.textContent = "Not started";
            progressInfoEl.textContent = "0 / 7";

            steps = buildSteps();
            currentStepIndex = 0;
            remaining = START_COUNTDOWN;

            updateActionButton();
        }

        function setFinishedState() {
            appState = "finished";
            clearInterval(intervalId);
            intervalId = null;

            phaseEl.textContent = "Complete";
            exerciseNameEl.textContent = "Workout complete";
            timerEl.textContent = "00:00";
            stepInfoEl.textContent = "Finished";
            progressInfoEl.textContent = "7 / 7";

            speak("Congratulations, you have completed this workout from Vitaliy Guro.");

            updateActionButton();
        }

        function updateDisplay(step) {
            phaseEl.textContent = step.phase;
            exerciseNameEl.textContent = step.exerciseName;
            timerEl.textContent = formatTime(remaining);
            stepInfoEl.textContent = step.stepInfo;
            progressInfoEl.textContent = step.progress;
        }

        function shouldSpeakCountdown(step) {
            if (step.exerciseName === "Glute Bridge on Heels") {
                return false;
            }
            return true;
        }

        function startStep(step) {
            remaining = step.seconds;
            updateDisplay(step);

            if (step.announce) {
                speak(step.announce);
            }

            clearInterval(intervalId);
            intervalId = setInterval(() => {
                if (appState !== "running") return;

                remaining -= 1;
                timerEl.textContent = formatTime(remaining);

                if (shouldSpeakCountdown(step) && remaining <= 3 && remaining >= 1) {
                    speak(String(remaining));
                }

                if (remaining <= 0) {
                    clearInterval(intervalId);
                    intervalId = null;
                    moveToNextStep();
                }
            }, 1000);
        }

        function moveToNextStep() {
            currentStepIndex += 1;

            if (currentStepIndex >= steps.length) {
                setFinishedState();
                return;
            }

            startStep(steps[currentStepIndex]);
        }

        function startRoutine() {
            warmupSpeech();

            if (appState === "ready" || appState === "finished") {
                steps = buildSteps();
                currentStepIndex = 0;
                appState = "running";
                updateActionButton();
                startStep(steps[currentStepIndex]);
                return;
            }

            if (appState === "paused") {
                appState = "running";
                updateActionButton();
            }
        }

        function pauseRoutine() {
            appState = "paused";
            updateActionButton();

            if ("speechSynthesis" in window) {
                window.speechSynthesis.cancel();
            }

            phaseEl.textContent = "Paused";
        }

        actionBtn.addEventListener("click", () => {
            if (appState === "ready" || appState === "finished" || appState === "paused") {
                startRoutine();
            } else if (appState === "running") {
                pauseRoutine();
            }
        });

        resetBtn.addEventListener("click", () => {
            setReadyState();
        });

        buildPlanTable();
        setReadyState();
    </script>
</body>
</html>
